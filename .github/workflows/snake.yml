# Place this file at .github/workflows/snake.yml in the FaroukYahaya/FaroukYahaya repo.
# It generates the contribution-snake SVG every 12 hours and on every push to main,
# committing the result to the `output` branch where the README loads it from.
name: Generate snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate the snake animations
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=#1F3A5F&color_dots=#e0e0e0,#bfd6f6,#8dbdff,#64a1f4,#4b91f1

      - name: Push to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
